name: CI

on: [push, pull_request]

jobs:
  # -------------------- JOB 1: Lint and Format Check --------------------
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black

      - name: Run Black formatter check
        run: black . --check

  # -------------------- JOB 2: Run Pytest Suite -------------------------
  test:
    name: Run Pytest
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          auto-update-conda: true

      - name: Install Conda dependencies
        shell: bash -l {0}
        run: |
          conda install -c conda-forge --yes pinocchio
      
      - name: Install Pip dependencies
        shell: bash -l {0}
        run: |
          pip install -e .[dev,cpu]
      
      - name: Run pytest
        shell: bash -l {0}
        run: pytest

  # ------------------ JOB 3: Build the documentation ------------------
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]

      - name: Build Sphinx documentation
        run: sphinx-build -b html docs/source docs/build/html

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  # ------------------ JOB 4: Deploy the documentation ------------------
  deploy-docs:
    name: Deploy Documentation
    # This job now requires ALL other jobs to succeed first
    needs: [lint, test, build-docs]
    # Only run this job on pushes to the main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
